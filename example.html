<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32-C6 Hub Controller</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #cbd5e1; transition: .3s; border-radius: 24px;
        }
        .slider:before {
            position: absolute; content: ""; height: 16px; width: 16px;
            left: 4px; bottom: 4px; background-color: white; transition: .3s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #22c55e; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body class="bg-[#f4f6f9] text-[#333] max-w-[900px] my-10 mx-auto px-5 font-sans">

    <header class="flex justify-between items-center border-b-2 border-[#e2e8f0] pb-5 mb-8">
        <h1 class="text-3xl font-bold tracking-tight">ESP32-C6 Hub Controller</h1>
        <button id="btn-connect" class="bg-[#2563eb] text-white font-semibold py-2.5 px-5 rounded-md cursor-pointer hover:bg-[#1d4ed8] transition-colors duration-200 disabled:bg-[#94a3b8] disabled:cursor-not-allowed">
            Connect Serial
        </button>
    </header>

    <section class="status-panel bg-white p-5 rounded-lg shadow-md mb-8 flex flex-wrap gap-10 items-center">
        <div>
            <strong class="font-bold">Serial Status:</strong> 
            <span id="serial-status-dot" class="status-indicator inline-block w-3 h-3 rounded-full bg-[#ef4444] mr-2 transition-colors duration-200"></span>
            <span id="serial-status-text">Disconnected</span>
        </div>
        <div>
            <strong class="font-bold">Hub State:</strong> 
            <span id="hub-state">UNKNOWN</span>
        </div>
        <div>
            <strong class="font-bold">Satellites Found:</strong> 
            <span id="satellites-count">0</span>
        </div>
        <button id="btn-discover" disabled class="bg-[#2563eb] text-white font-semibold py-2.5 px-5 rounded-md cursor-pointer hover:bg-[#1d4ed8] transition-colors duration-200 disabled:bg-[#94a3b8] disabled:cursor-not-allowed">
            Trigger Discovery
        </button>
    </section>

    <section>
        <h2 class="text-2xl font-bold mb-4">Discovered Satellites</h2>
        <div class="overflow-hidden rounded-lg shadow-md bg-white">
            <table class="w-full border-collapse text-left">
                <thead>
                    <tr class="bg-[#f8fafc] border-b border-[#e2e8f0]">
                        <th class="p-4.5 pl-5 text-[#64748b] font-semibold text-xs uppercase tracking-wider">Satellite ID</th>
                        <th class="p-4.5 text-[#64748b] font-semibold text-xs uppercase tracking-wider">Light 1</th>
                        <th class="p-4.5 text-[#64748b] font-semibold text-xs uppercase tracking-wider">Light 2</th>
                        <th class="p-4.5 text-[#64748b] font-semibold text-xs uppercase tracking-wider">Light 3</th>
                        <th class="p-4.5 text-[#64748b] font-semibold text-xs uppercase tracking-wider">Light 4</th>
                    </tr>
                </thead>
                <tbody id="satellite-rows" class="divide-y divide-[#e2e8f0]"></tbody>
            </table>
        </div>
    </section>

    <script>
        let port = null;
        let writer = null;
        let reader = null;
        let readableStreamClosed = null;

        const btnConnect = document.getElementById('btn-connect');
        const btnDiscover = document.getElementById('btn-discover');
        const serialDot = document.getElementById('serial-status-dot');
        const serialText = document.getElementById('serial-status-text');
        const hubStateText = document.getElementById('hub-state');
        const satCountText = document.getElementById('satellites-count');
        const tableBody = document.getElementById('satellite-rows');

        let satelliteRegistry = {}; 
        let discoveryOrder = []; 

        btnConnect.addEventListener('click', async () => {
            if (port) {
                if (reader) {
                    await reader.cancel();
                    await readableStreamClosed.catch(() => {});
                    reader = null;
                }
                if (writer) {
                    await writer.close();
                    writer = null;
                }
                await port.close();
                port = null;
                updateSerialUI(false);
                return;
            }

            try {
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                
                updateSerialUI(true);
                writer = port.writable.getWriter();
                readSerialLoop();
            } catch (err) {
                console.error("Serial Connection Failed:", err);
                alert("Failed to connect to Serial device.");
                updateSerialUI(false);
            }
        });

        btnDiscover.addEventListener('click', async () => {
            if (writer) {
                tableBody.innerHTML = ""; 
                satelliteRegistry = {};
                discoveryOrder = [];
                const encoder = new TextEncoder();
                await writer.write(encoder.encode("DISCOVER\n"));
            }
        });

        function updateSerialUI(isConnected) {
            if (isConnected) {
                btnConnect.textContent = "Disconnect Serial";
                serialDot.className = "status-indicator inline-block w-3 h-3 rounded-full mr-2 transition-colors duration-200 bg-[#22c55e]";
                serialText.textContent = "Connected";
                btnDiscover.disabled = false;
            } else {
                btnConnect.textContent = "Connect Serial";
                serialDot.className = "status-indicator inline-block w-3 h-3 rounded-full mr-2 transition-colors duration-200 bg-[#ef4444]";
                serialText.textContent = "Disconnected";
                hubStateText.textContent = "UNKNOWN";
                satCountText.textContent = "0";
                btnDiscover.disabled = true;
                tableBody.innerHTML = "";
            }
        }

        async function readSerialLoop() {
            const decoder = new TextDecoderStream();
            readableStreamClosed = port.readable.pipeTo(decoder.writable);
            reader = decoder.readable.getReader();

            let buffer = "";
            try {
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    buffer += value;
                    let lines = buffer.split("\n");
                    buffer = lines.pop(); 

                    for (let line of lines) {
                        parseIncomingLine(line.trim());
                    }
                }
            } catch (error) {
                console.error("Read error:", error);
            } finally {
                reader.releaseLock();
            }
        }

        function parseIncomingLine(line) {
            if (!line) return;
            console.log("From ESP32:", line);

            if (line.startsWith("STATUS:")) {
                const state = line.split(":")[1];
                hubStateText.textContent = state;
                if (state === "DISCOVERING") {
                    serialDot.className = "status-indicator inline-block w-3 h-3 rounded-full mr-2 transition-colors duration-200 bg-[#eab308]";
                } else if (state === "RUNNING") {
                    serialDot.className = "status-indicator inline-block w-3 h-3 rounded-full mr-2 transition-colors duration-200 bg-[#22c55e]";
                }
            }
            else if (line.startsWith("COUNT:")) {
                satCountText.textContent = line.split(":")[1];
            }
            else if (line.startsWith("FOUND:")) {
                const idStr = line.split(":")[1];
                if (!satelliteRegistry[idStr]) {
                    satelliteRegistry[idStr] = [false, false, false, false];
                    discoveryOrder.push(idStr);
                    appendSatelliteRow(idStr);
                }
            }
        }

        function appendSatelliteRow(idStr) {
            const tr = document.createElement('tr');
            tr.id = `sat-${idStr}`;
            
            let html = `<td class="p-4.5 pl-5"><code class="font-bold text-[#0f172a] bg-[#f1f5f9] px-1.5 py-0.5 rounded">${idStr}</code></td>`;
            for (let i = 0; i < 4; i++) {
                html += `
                    <td class="p-4.5">
                        <label class="switch">
                            <input type="checkbox" data-sat="${idStr}" data-light="${i}" onchange="handleToggle(this)">
                            <span class="slider"></span>
                        </label>
                    </td>`;
            }
            tr.innerHTML = html;
            tableBody.appendChild(tr);
        }

        async function handleToggle(checkbox) {
            const idStr = checkbox.getAttribute('data-sat');
            const lightIndex = parseInt(checkbox.getAttribute('data-light'));

            // Keep track of state locally
            satelliteRegistry[idStr][lightIndex] = checkbox.checked;

            if (writer) {
                // 8 clients max * 4 channels = 32 bytes total
                const totalLights = 32;
                const byteArray = new Uint8Array(totalLights);

                // Build sequential 1-byte array block matched with active discovery sequence
                for (let c = 0; c < discoveryOrder.length && c < 8; c++) {
                    const satId = discoveryOrder[c];
                    const states = satelliteRegistry[satId];
                    for (let l = 0; l < 4; l++) {
                        const offset = (c * 4) + l;
                        byteArray[offset] = states[l] ? 255 : 0;
                    }
                }

                // Append simple text token header prefix "FRAME:"
                const headerBytes = new TextEncoder().encode("FRAME:");
                const outputPayload = new Uint8Array(headerBytes.length + byteArray.length);
                
                outputPayload.set(headerBytes, 0);
                outputPayload.set(byteArray, headerBytes.length);

                await writer.write(outputPayload);
                console.log(`Dispatched Full Uint8 Array Frame (${byteArray.length} bytes total)`);
            }
        }
    </script>
</body>
</html>
